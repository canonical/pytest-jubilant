type: charm
name: simple
title: Simple Test Charm
summary: A simple test charm for use in integration tests.
description: What it says on the tin.

# https://documentation.ubuntu.com/charmcraft/stable/howto/build-guides/select-platforms/
base: ubuntu@22.04
platforms:
  amd64:
  arm64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

actions:
  exec:
    description: Execute the provided code in the context of the action handler.
    params:
      code:
        type: string
        description: The code to execute.
    required:
      - code
    additionalProperties: false
